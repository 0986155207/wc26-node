<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="World Cup 26">
<meta name="theme-color" content="#0A3161">
<!-- Icon khi "Thêm vào MH chính" trên iPhone -->
<link rel="apple-touch-icon" sizes="180x180" href="/icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
<link rel="manifest" href="/manifest.webmanifest">
<title>World Cup 2026 Live</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
/* =====================================================================
   WORLD CUP 2026 LIVE — thiết kế mobile-first cho iPhone
   Bảng màu 3 nước chủ nhà: Đỏ Canada #C8102E · Lục Mexico #006847 ·
   Lam Mỹ #0A3161 trên nền sáng #F7F6F2
===================================================================== */
:root{
  --bg:#F7F6F2; --card:#FFFFFF; --ink:#11161C; --mut:#6B7280;
  --line:#E7E5DE;
  --red:#C8102E; --green:#006847; --blue:#0A3161; --gold:#F9A825;
  --radius:16px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--ink);
  font-family:'Archivo',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased}
body{padding-bottom:calc(76px + var(--safe-b))}

/* ---------- Header ---------- */
header{position:sticky;top:0;z-index:50;background:rgba(247,246,242,.92);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line)}
.ribbon{display:flex;height:4px}
.ribbon span{flex:1}
.ribbon span:nth-child(1){background:var(--red)}
.ribbon span:nth-child(2){background:var(--green)}
.ribbon span:nth-child(3){background:var(--blue)}
.head-row{display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 10px}
.brand{font-family:'Archivo Black',sans-serif;font-size:20px;letter-spacing:-.5px}
.brand small{display:block;font-family:'Archivo',sans-serif;font-weight:500;
  font-size:11px;color:var(--mut);letter-spacing:.6px;margin-top:1px}
.btn-refresh{border:1px solid var(--line);background:var(--card);color:var(--ink);
  border-radius:99px;padding:8px 14px;font-size:13px;font-weight:700;
  font-family:inherit;display:flex;align-items:center;gap:6px;cursor:pointer}
.btn-refresh:active{transform:scale(.95)}
.btn-refresh.spin svg{animation:rot 1s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.updated{padding:0 16px 8px;font-size:11px;color:var(--mut)}

/* ---------- Trang ---------- */
main{padding:14px 14px 0;max-width:680px;margin:0 auto}
.page{display:none}
.page.on{display:block;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
h2.sec{font-family:'Archivo Black',sans-serif;font-size:15px;margin:18px 2px 10px;
  display:flex;align-items:center;gap:8px}
h2.sec .bar{width:18px;height:4px;border-radius:2px;background:var(--green)}

/* ---------- Thẻ trận đấu ---------- */
.mcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px;margin-bottom:10px;position:relative;overflow:hidden}
.mcard.live{border-color:var(--red)}
.mcard.tappable{cursor:pointer}
.mcard.tappable:active{transform:scale(.985)}
.mcard.tappable .mtop::after{content:'›';position:absolute;right:14px;top:12px;
  font-size:20px;color:var(--mut);font-weight:700;line-height:1}
.mcard.live::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;
  background:var(--red)}
.mtop{display:flex;justify-content:space-between;align-items:center;
  font-size:11px;color:var(--mut);margin-bottom:10px;font-weight:500}
.chip{background:var(--bg);border:1px solid var(--line);border-radius:99px;
  padding:2px 9px;font-weight:700;color:var(--ink)}
.badge{border-radius:99px;padding:3px 10px;font-weight:700;font-size:11px}
.badge.live{background:var(--red);color:#fff;display:flex;align-items:center;gap:5px}
.badge.live .dot{width:6px;height:6px;border-radius:50%;background:#fff;
  animation:pulse 1s ease infinite}
@keyframes pulse{50%{opacity:.25}}
.badge.ft{background:var(--ink);color:#fff}
.badge.soon{background:#EAF1FB;color:var(--blue)}
.mrow{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
.team{display:flex;flex-direction:column;align-items:center;gap:4px;text-align:center}
.team .flag{font-size:32px;line-height:1}
.team .name{font-weight:700;font-size:13px}
.score{font-family:'Archivo Black',sans-serif;font-size:30px;letter-spacing:1px;
  text-align:center;min-width:86px}
.score .time{font-family:'Archivo',sans-serif;font-weight:700;font-size:17px;
  color:var(--blue)}
.minfo{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:11px;padding-top:10px;
  border-top:1px dashed var(--line);font-size:12px;color:var(--mut)}
.minfo b{color:var(--ink);font-weight:700}
.ai-chip{margin-top:10px;background:linear-gradient(90deg,#FFF7E0,#FFFDF4);
  border:1px solid #F2E2AC;border-radius:12px;padding:8px 11px;font-size:12px}
.ai-chip .head{font-weight:800;color:#8A6D00;display:flex;justify-content:space-between}
.ai-chip .probs{display:flex;gap:10px;margin-top:3px;color:var(--mut);font-size:11px}
.ai-chip .cmt{margin-top:4px;color:#4B4B45}

/* ---------- Ngày ---------- */
.daypill{position:sticky;top:84px;z-index:5;display:inline-block;background:var(--ink);
  color:#fff;border-radius:99px;padding:5px 14px;font-size:12px;font-weight:700;
  margin:14px 0 10px}

/* ---------- Bảng xếp hạng ---------- */
.gcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  margin-bottom:12px;overflow:hidden}
.gcard .ghead{display:flex;align-items:center;gap:10px;padding:11px 14px;
  border-bottom:1px solid var(--line)}
.gcard .gletter{font-family:'Archivo Black',sans-serif;font-size:18px;width:34px;
  height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  color:#fff}
.gcard table{width:100%;border-collapse:collapse;font-size:12.5px}
.gcard th{font-size:10px;color:var(--mut);font-weight:700;text-transform:uppercase;
  letter-spacing:.4px;padding:7px 6px;text-align:center}
.gcard td{padding:8px 6px;text-align:center;border-top:1px solid #F1EFE9}
.gcard td.t{text-align:left;font-weight:700;white-space:nowrap}
.gcard td.pts{font-family:'Archivo Black',sans-serif}
.pos{display:inline-flex;width:18px;height:18px;border-radius:6px;align-items:center;
  justify-content:center;font-size:10px;font-weight:800}
.pos.q{background:#DCEFE5;color:var(--green)}
.pos.m{background:#FFF3D6;color:#9A7400}
.pos.x{background:#F2F1ED;color:var(--mut)}
.legend{font-size:11px;color:var(--mut);margin:4px 2px 16px}

/* ---------- Trạng thái trống ---------- */
.empty{background:var(--card);border:1px dashed var(--line);border-radius:var(--radius);
  padding:26px 16px;text-align:center;color:var(--mut);font-size:13px;margin-top:10px}
.empty .big{font-size:30px;margin-bottom:6px}

/* ---------- Nút AI & toast ---------- */
.btn-ai{width:100%;border:none;border-radius:14px;padding:14px;margin:4px 0 14px;
  background:linear-gradient(135deg,var(--blue),#155CA8);color:#fff;font-size:14px;
  font-weight:800;font-family:inherit;display:flex;align-items:center;
  justify-content:center;gap:8px;cursor:pointer}
.btn-ai:active{transform:scale(.98)}
.btn-ai:disabled{opacity:.6}
.toast{position:fixed;left:50%;bottom:calc(96px + var(--safe-b));transform:translateX(-50%);
  background:var(--ink);color:#fff;border-radius:99px;padding:10px 18px;font-size:13px;
  font-weight:700;z-index:99;opacity:0;transition:opacity .3s;pointer-events:none;
  max-width:88vw;text-align:center}
.toast.show{opacity:1}

/* ---------- Popup chi tiết trận (bottom sheet) ---------- */
.sheet-bg{position:fixed;inset:0;z-index:80;background:rgba(10,16,28,.55);
  backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
  opacity:0;pointer-events:none;transition:opacity .25s}
.sheet-bg.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:81;max-width:680px;margin:0 auto;
  background:var(--card);border-radius:22px 22px 0 0;padding:8px 16px calc(24px + var(--safe-b));
  max-height:86vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.22,1,.36,1);
  -webkit-overflow-scrolling:touch}
.sheet.show{transform:translateY(0)}
.sheet .grip{width:40px;height:5px;border-radius:99px;background:var(--line);
  margin:8px auto 14px}
.sheet-head{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;
  padding-bottom:14px;border-bottom:1px solid var(--line)}
.sheet-head .team{gap:6px}
.sheet-head .flag{font-size:38px}
.sheet-head .sc{font-family:'Archivo Black',sans-serif;font-size:34px}
.sheet-meta{font-size:12px;color:var(--mut);text-align:center;margin:12px 0 4px;
  display:flex;flex-wrap:wrap;gap:4px 14px;justify-content:center}
.sheet-meta b{color:var(--ink)}
.tl-title{font-family:'Archivo Black',sans-serif;font-size:13px;margin:18px 2px 12px;
  display:flex;align-items:center;gap:8px}
.tl-title .bar{width:16px;height:4px;border-radius:2px;background:var(--green)}
.timeline{position:relative;margin:0 4px}
.tl-row{display:grid;grid-template-columns:1fr 54px 1fr;align-items:center;gap:8px;
  padding:9px 0;min-height:40px}
.tl-min{justify-self:center;background:var(--ink);color:#fff;border-radius:99px;
  font-size:12px;font-weight:800;padding:3px 9px;white-space:nowrap}
.tl-ev{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600}
.tl-ev.home{justify-content:flex-end;text-align:right}
.tl-ev.away{justify-content:flex-start;text-align:left}
.tl-ev .ic{font-size:18px;line-height:1}
.tl-ev .pl{color:var(--ink)}
.tl-ev .ty{color:var(--mut);font-size:11px;font-weight:500}
.summary{background:linear-gradient(90deg,#FFF7E0,#FFFDF4);border:1px solid #F2E2AC;
  border-radius:14px;padding:13px 14px;margin-top:8px;font-size:13.5px;line-height:1.55;color:#4B4B45}
.summary .h{font-weight:800;color:#8A6D00;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.sheet-loading{text-align:center;padding:40px 0;color:var(--mut);font-size:13px}
.sheet-loading .ball{font-size:34px}
.sheet-note{font-size:11px;color:var(--mut);text-align:center;margin-top:16px;line-height:1.5}

/* ---------- Vòng knock-out: segmented + bracket ---------- */
.seg{display:flex;background:var(--bg);border:1px solid var(--line);border-radius:12px;
  padding:3px;margin:4px 2px 16px;gap:3px}
.seg button{flex:1;border:none;background:none;font-family:inherit;font-size:13px;
  font-weight:700;color:var(--mut);padding:8px 0;border-radius:9px;cursor:pointer}
.seg button.on{background:var(--card);color:var(--blue);box-shadow:0 1px 3px rgba(0,0,0,.08)}

.bracket-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:4px 2px 14px;margin:0 -14px;
  scroll-snap-type:x proximity}
.bracket{display:flex;gap:14px;padding:0 14px;min-width:min-content}
.bcol{flex:0 0 auto;width:208px;scroll-snap-align:start}
.bcol-h{font-family:'Archivo Black',sans-serif;font-size:12px;color:var(--blue);
  text-align:center;padding:6px;background:#EAF1FB;border-radius:9px;margin-bottom:10px;
  position:sticky;top:0}
.bcol.final .bcol-h{background:#FFF3D6;color:#9A7400}
.bcol-body{display:flex;flex-direction:column;justify-content:space-around;gap:10px;min-height:60px}
.bcol{position:relative}
/* Đường nối nhánh: mỗi cột (trừ cột đầu) vẽ các đường cong nối từ cột trước */
.bcol-link{position:absolute;left:-14px;top:0;width:14px;height:100%;pointer-events:none;overflow:visible}
.bcol-link path{fill:none;stroke:var(--line);stroke-width:2}
.bmatch{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 10px}
.bmatch.tappable{cursor:pointer}.bmatch.tappable:active{transform:scale(.98)}
.brow{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:3px 0}
.brow + .brow{border-top:1px dashed var(--line)}
.brow .tm{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brow .tm .fl{font-size:16px}
.brow.win .tm{color:var(--green)}
.brow.lose .tm{opacity:.5}
.brow .g{font-family:'Archivo Black',sans-serif;font-size:14px;min-width:30px;text-align:right}
.brow .pen{font-size:10px;color:var(--mut);font-weight:600}
.btbd{color:var(--mut);font-style:italic;font-weight:500}
.bmatch-meta{font-size:10px;color:var(--mut);text-align:center;margin-top:5px;
  padding-top:5px;border-top:1px solid #F1EFE9}
.bmatch-meta.live{color:var(--red);font-weight:700}
.champion{background:linear-gradient(135deg,#FFF7E0,#FFE9A8);border:1px solid #F2D580;
  border-radius:14px;padding:16px;text-align:center;margin-bottom:8px}
.champion .cup{font-size:40px}
.champion .lbl{font-size:11px;color:#9A7400;font-weight:700;letter-spacing:2px;margin-top:4px}
.champion .nm{font-family:'Archivo Black',sans-serif;font-size:22px;color:#7a5a00;margin-top:2px}

/* ---------- Card bật thông báo ---------- */
.push-card{background:linear-gradient(135deg,#0A3161,#155CA8);color:#fff;border-radius:var(--radius);
  padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.push-card .ic{font-size:26px}
.push-card .tx{flex:1;font-size:13px;line-height:1.4}
.push-card .tx b{font-weight:800}
.push-card button{border:none;background:#fff;color:var(--blue);font-family:inherit;
  font-weight:800;font-size:13px;border-radius:99px;padding:9px 14px;white-space:nowrap;cursor:pointer}
.push-card button:active{transform:scale(.96)}
.push-card.ok{background:#DCEFE5;color:var(--green)}
.push-card.ok .tx{color:#0a5c3a}

/* ---------- Tab bar kiểu iOS ---------- */
nav{position:fixed;left:0;right:0;bottom:0;z-index:60;
  background:rgba(255,255,255,.94);backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);border-top:1px solid var(--line);
  display:flex;padding:6px 4px calc(6px + var(--safe-b))}
nav button{flex:1;border:none;background:none;font-family:inherit;color:var(--mut);
  font-size:10px;font-weight:700;display:flex;flex-direction:column;align-items:center;
  gap:3px;padding:5px 0;cursor:pointer}
nav button .ico{font-size:21px;line-height:1}
nav button.on{color:var(--blue)}
nav button.on .ico{transform:translateY(-1px)}

/* ---------- Loading ---------- */
#loader{display:flex;flex-direction:column;align-items:center;gap:14px;padding:70px 0}
.ball{font-size:42px;animation:bounce 1s ease infinite}
@keyframes bounce{50%{transform:translateY(-14px) rotate(180deg)}}
#loader p{color:var(--mut);font-size:13px}

@media(min-width:560px){
  .team .flag{font-size:38px}
  .team .name{font-size:14px}
}
@media(prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}
</style>
</head>
<body>

<header>
  <div class="ribbon"><span></span><span></span><span></span></div>
  <div class="head-row">
    <div class="brand">WORLD CUP 26<small>MỸ · CANADA · MEXICO — 48 ĐỘI · 12 BẢNG</small></div>
    <button class="btn-refresh" id="btnRefresh" onclick="forceRefresh()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 3v6h-6"/></svg>
      Làm mới
    </button>
  </div>
  <div class="updated" id="updated">Đang tải dữ liệu…</div>
</header>

<main>
  <div id="loader"><div class="ball">⚽</div><p>Đang tải World Cup 2026…</p></div>

  <section class="page on" id="page-today"></section>
  <section class="page" id="page-schedule"></section>
  <section class="page" id="page-groups"></section>
  <section class="page" id="page-knockout"></section>
  <section class="page" id="page-ai"></section>
</main>

<nav>
  <button class="on" data-page="today"   onclick="goTab(this)"><span class="ico">🔴</span>Hôm nay</button>
  <button data-page="schedule" onclick="goTab(this)"><span class="ico">📅</span>Lịch đấu</button>
  <button data-page="groups"   onclick="goTab(this)"><span class="ico">📊</span>12 Bảng</button>
  <button data-page="knockout" onclick="goTab(this)"><span class="ico">🏆</span>Vòng trong</button>
  <button data-page="ai"       onclick="goTab(this)"><span class="ico">🤖</span>AI Dự đoán</button>
</nav>

<div class="sheet-bg" id="sheetBg" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"></div>

<div class="toast" id="toast"></div>

<script>
/* =====================================================================
   LOGIC GIAO DIỆN — gọi REST API Node.js (/api/data, /api/predict)
===================================================================== */
const TZ = 'Asia/Ho_Chi_Minh';
const GROUP_COLORS = ['#C8102E','#006847','#0A3161','#B45309','#7C3AED','#0E7490',
                      '#BE185D','#15803D','#1D4ED8','#9F1239','#4D7C0F','#6D28D9'];
let APP = null;          // dữ liệu từ API
let TEAM = {};           // map TeamEN -> {vi, flag, group}
let PRED = {};           // map matchId -> prediction

/* ===================== THÔNG BÁO ĐẨY (Web Push) ===================== */
const pushSupported = 'serviceWorker' in navigator && 'PushManager' in window && 'Notification' in window;
const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);

function urlB64ToUint8Array(base64){
  const padding = '='.repeat((4 - base64.length % 4) % 4);
  const b64 = (base64 + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(b64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

// Trả về trạng thái: 'unsupported' | 'need-install' | 'subscribed' | 'can-subscribe'
async function pushStatus(){
  if (!pushSupported) return isIOS && !isStandalone ? 'need-install' : 'unsupported';
  if (isIOS && !isStandalone) return 'need-install';
  try{
    const reg = await navigator.serviceWorker.getRegistration();
    if (reg){
      const sub = await reg.pushManager.getSubscription();
      if (sub) return 'subscribed';
    }
  }catch(e){ /* bỏ qua */ }
  return Notification.permission === 'denied' ? 'denied' : 'can-subscribe';
}

async function enablePush(){
  try{
    const reg = await navigator.serviceWorker.register('/sw.js');
    await navigator.serviceWorker.ready;

    const perm = await Notification.requestPermission();
    if (perm !== 'granted'){ toast('Bạn đã từ chối quyền thông báo.'); return; }

    const keyRes = await fetch('/api/push?action=key').then(r => r.json());
    if (!keyRes.publicKey){ toast('Máy chủ chưa cấu hình thông báo (VAPID).'); return; }

    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlB64ToUint8Array(keyRes.publicKey)
    });

    await fetch('/api/push', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'subscribe',
        subscription: sub.toJSON(),
        prefs: { daily: true, kickoff: true, result: true }
      })
    });
    toast('✅ Đã bật thông báo! Bạn sẽ nhận lịch đấu, nhắc giờ và kết quả.');
    renderPushCard();
  }catch(e){
    toast('Không bật được thông báo: ' + e.message);
  }
}

async function renderPushCard(){
  const host = document.getElementById('pushCardHost');
  if (!host) return;
  const st = await pushStatus();
  if (st === 'unsupported' || st === 'denied'){ host.innerHTML = ''; return; }

  if (st === 'subscribed'){
    host.innerHTML = `<div class="push-card ok">
      <span class="ic">🔔</span>
      <div class="tx"><b>Đã bật thông báo</b><br>Bạn sẽ nhận lịch đấu mỗi sáng, nhắc trước giờ bóng lăn và kết quả trận.</div>
    </div>`;
    return;
  }
  if (st === 'need-install'){
    host.innerHTML = `<div class="push-card">
      <span class="ic">📲</span>

window.addEventListener('load', () => {

});

async function loadData(force){
  try{
    const res = await fetch('/api/data' + (force ? '?refresh=1' : ''));
    if (!res.ok) throw new Error('HTTP ' + res.status);
    onData(await res.json());
    return true;
  }catch(e){
    toast('Lỗi tải dữ liệu: ' + e.message);
    return false;
  }
}

async function forceRefresh(){
  const b = document.getElementById('btnRefresh');
  b.classList.add('spin');
  const ok = await loadData(true);
  b.classList.remove('spin');
  if (ok) toast('Đã cập nhật tỷ số mới nhất ⚽');
}

function onData(data){
  APP = data;
  TEAM = {}; PRED = {};
  (APP.teams || []).forEach(t => TEAM[t.en] = { group: t.group, vi: t.vi, flag: t.flag });
  (APP.predictions || []).forEach(p => PRED[String(p.matchId)] = p);
  document.getElementById('loader').style.display = 'none';

  const syncTxt = APP.lastSyncAt
    ? 'Cập nhật lúc ' + new Date(APP.lastSyncAt).toLocaleTimeString('vi-VN',
        { hour: '2-digit', minute: '2-digit', timeZone: TZ }) + ' (giờ VN)'
    : 'Chưa đồng bộ được dữ liệu';
  document.getElementById('updated').textContent =
    syncTxt + (APP.source ? ' · nguồn: ' + APP.source : '') + ' · tự làm mới mỗi phút';

  renderToday(); renderSchedule(); renderGroups(); renderKnockout(); renderAI();
}

/* ---------- tiện ích ---------- */
const vnDate = d => new Date(d).toLocaleDateString('en-CA', { timeZone: TZ }); // yyyy-mm-dd
const vnTime = d => new Date(d).toLocaleTimeString('vi-VN',
  { hour: '2-digit', minute: '2-digit', timeZone: TZ });
const vnLong = d => new Date(d).toLocaleDateString('vi-VN',
  { weekday: 'long', day: 'numeric', month: 'numeric', timeZone: TZ });
const vnShort = d => new Date(d).toLocaleDateString('vi-VN',
  { day: '2-digit', month: '2-digit', timeZone: TZ }) + ' · ' + vnTime(d);
const num = n => Number(n).toLocaleString('vi-VN');
const esc = s => String(s ?? '').replace(/[&<>"]/g,
  c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const isLive = m => m.status === 'ĐANG ĐÁ' || m.status === 'Nghỉ giữa hiệp';
const isDone = m => m.status === 'Kết thúc';
const hasTeams = m => !!(m.home && m.away);   // trận knock-out chưa có đội thì ẩn khỏi lịch

function teamCell(en){
  const t = TEAM[en] || { vi: en, flag: '⚽' };
  return `<div class="team"><span class="flag">${t.flag}</span>
          <span class="name">${esc(t.vi)}</span></div>`;
}

function matchCard(m, showPred){
  const live = isLive(m), done = isDone(m);
  const badge = live ? `<span class="badge live"><span class="dot"></span>${m.status === 'ĐANG ĐÁ' ? 'TRỰC TIẾP' : 'GIỮA HIỆP'}</span>`
              : done ? `<span class="badge ft">KẾT THÚC</span>`
              : `<span class="badge soon">${esc(m.status)}</span>`;
  const center = (live || done)
    ? `<div class="score">${m.homeGoals ?? '–'}<span style="color:#C9C6BD"> : </span>${m.awayGoals ?? '–'}</div>`
    : `<div class="score"><span class="time">${vnTime(m.dateUTC)}</span></div>`;

  const info = [];
  if (m.venue) info.push(`🏟️ <b>${esc(m.venue)}</b>${m.city ? ' · ' + esc(m.city) : ''}`);
  else if (m.city) info.push(`📍 ${esc(m.city)}`);
  if (m.attendance) info.push(`👥 <b>${num(m.attendance)}</b> khán giả`);

  let ai = '';
  const p = PRED[String(m.id)];
  if (showPred && p && !done){
    ai = `<div class="ai-chip">
      <div class="head"><span>🤖 Gemini dự đoán</span><span>${p.predHome} – ${p.predAway}</span></div>
      <div class="probs"><span>Thắng ${p.probHome}%</span><span>Hòa ${p.probDraw}%</span><span>Thua ${p.probAway}%</span></div>
      <div class="cmt">${esc(p.comment)}</div></div>`;
  }

  return `<div class="mcard${live ? ' live' : ''}${(live || done) ? ' tappable' : ''}"${(live || done) ? ` onclick="openMatch('${esc(m.id)}')"` : ''}>
    <div class="mtop">
      <span class="chip">${m.group ? 'Bảng ' + esc(m.group) : esc(m.stage)}</span>${badge}
    </div>
    <div class="mrow">${teamCell(m.home)}${center}${teamCell(m.away)}</div>
    ${info.length ? `<div class="minfo">${info.map(x => `<span>${x}</span>`).join('')}</div>` : ''}
    ${ai}
  </div>`;
}

function renderToday(){
  const el = document.getElementById('page-today');
  const today = vnDate(new Date());
  const list = (APP.matches || []).filter(m => hasTeams(m) && vnDate(m.dateUTC) === today)
    .sort((a, b) => a.dateUTC.localeCompare(b.dateUTC));

  const lives = list.filter(isLive);
  const dones = list.filter(isDone);
  const next  = list.filter(m => !isLive(m) && !isDone(m));
  let html = '';

  if (lives.length){
    html += `<h2 class="sec"><span class="bar" style="background:var(--red)"></span>Đang thi đấu</h2>`
          + lives.map(m => matchCard(m, true)).join('');
  }
  if (next.length){
    html += `<h2 class="sec"><span class="bar" style="background:var(--blue)"></span>Sắp diễn ra hôm nay</h2>`
          + next.map(m => matchCard(m, true)).join('');
  }
  if (dones.length){
    html += `<h2 class="sec"><span class="bar"></span>Đã kết thúc hôm nay</h2>`
          + dones.map(m => matchCard(m, true)).join('');
  }

  if (!list.length){
    const future = (APP.matches || []).filter(m => hasTeams(m) && vnDate(m.dateUTC) > today)
      .sort((a, b) => a.dateUTC.localeCompare(b.dateUTC));
    if (future.length){
      const nextDay = vnDate(future[0].dateUTC);
      const dayList = future.filter(m => vnDate(m.dateUTC) === nextDay);

        Ngày thi đấu kế tiếp — ${vnLong(future[0].dateUTC)}</h2>`

    } else {
      html = `<div class="empty"><div class="big">⚽</div>
        Chưa có dữ liệu. Bấm "Làm mới" hoặc kiểm tra biến môi trường trên Vercel.</div>`;
    }
  }
  el.innerHTML = `<div id="pushCardHost"></div>` + html;
  renderPushCard();
}

/* ---------- TAB VÒNG TRONG (knock-out) ---------- */
const KO_ORDER = ['Vòng 1/16', 'Vòng 1/8', 'Tứ kết', 'Bán kết', 'Chung kết'];
let koView = 'bracket';   // 'bracket' | 'list'

// Xác định đội thắng một trận knock-out (ưu tiên luân lưu nếu hòa)
function koWinner(m){
  if (!isDone(m) || m.homeGoals == null || m.awayGoals == null) return null;
  if (m.homeGoals > m.awayGoals) return 'home';
  if (m.awayGoals > m.homeGoals) return 'away';
  if (m.homePen != null && m.awayPen != null){
    if (m.homePen > m.awayPen) return 'home';
    if (m.awayPen > m.homePen) return 'away';
  }
  return null;
}

function setKoView(v){ koView = v; renderKnockout(); }

function renderKnockout(){
  const el = document.getElementById('page-knockout');
  const ko = (APP.matches || []).filter(m => m.stage && m.stage !== 'Vòng bảng');

  // Có trận knock-out nào với ít nhất 1 đội đã xác định chưa?
  const anyTeams = ko.some(hasTeams);

  if (!ko.length){
    el.innerHTML = `<div class="empty"><div class="big">🏆</div>
      Vòng loại trực tiếp (knock-out) sẽ bắt đầu sau khi kết thúc vòng bảng.
      Lịch và sơ đồ nhánh đấu sẽ tự động hiển thị tại đây khi có dữ liệu chính thức từ FIFA.</div>`;
    return;
  }

  const seg = `<div class="seg">
    <button class="${koView === 'bracket' ? 'on' : ''}" onclick="setKoView('bracket')">🗂️ Sơ đồ</button>
    <button class="${koView === 'list' ? 'on' : ''}" onclick="setKoView('list')">📋 Danh sách</button>
  </div>`;

  // Vô địch (nếu chung kết đã có kết quả)
  const finalM = ko.find(m => m.stage === 'Chung kết' && isDone(m));
  let champ = '';
  if (finalM){
    const w = koWinner(finalM);
    if (w){
      const wt = TEAM[w === 'home' ? finalM.home : finalM.away] || { vi: '?', flag: '🏆' };
      champ = `<div class="champion"><div class="cup">🏆</div>
        <div class="lbl">VÔ ĐỊCH WORLD CUP 2026</div>
        <div class="nm">${wt.flag} ${esc(wt.vi)}</div></div>`;
    }
  }

  el.innerHTML = seg + champ + (koView === 'bracket' ? bracketHTML(ko) : koListHTML(ko))
    + `<div class="sheet-note" style="margin-top:14px">Sơ đồ hiển thị theo dữ liệu chính thức;
       các cặp đấu sẽ điền dần khi FIFA xác định đội đi tiếp. Bấm vào trận đã đá để xem diễn biến.</div>`;

  if (koView === 'bracket') requestAnimationFrame(drawBracketLinks);
}

// Vẽ đường nối nhánh đấu: 2 trận vòng trước → 1 trận vòng sau (cấu trúc loại trực tiếp)
function drawBracketLinks(){
  const wrap = document.querySelector('#page-knockout .bracket');
  if (!wrap) return;
  const cols = [...wrap.querySelectorAll('.bcol')];
  const NS = 'http://www.w3.org/2000/svg';
  cols.forEach((col, ci) => {
    const old = col.querySelector('.bcol-link');
    if (old) old.remove();
    if (ci === 0) return;
    const prevCards = [...cols[ci - 1].querySelectorAll('.bmatch')];
    const thisCards = [...col.querySelectorAll('.bmatch')];
    if (!prevCards.length || !thisCards.length) return;

    const colRect = col.getBoundingClientRect();
    const prevRect = cols[ci - 1].getBoundingClientRect();
    const h = col.offsetHeight;
    const svg = document.createElementNS(NS, 'svg');
    svg.setAttribute('class', 'bcol-link');
    svg.setAttribute('viewBox', `0 0 14 ${h}`);
    svg.setAttribute('preserveAspectRatio', 'none');
    svg.style.height = h + 'px';

    thisCards.forEach((tc, k) => {
      const tr = tc.getBoundingClientRect();
      const targetY = (tr.top + tr.height / 2) - colRect.top;
      [2 * k, 2 * k + 1].forEach(si => {
        const sc = prevCards[si];
        if (!sc) return;
        const sr = sc.getBoundingClientRect();
        const sourceY = (sr.top + sr.height / 2) - prevRect.top;
        const p = document.createElementNS(NS, 'path');
        p.setAttribute('d', `M0,${sourceY} C7,${sourceY} 7,${targetY} 14,${targetY}`);
        svg.appendChild(p);
      });
    });
    col.appendChild(svg);
  });
}

// Một dòng đội trong thẻ bracket
function koTeamRow(m, side){
  const name = side === 'home' ? m.home : m.away;
  const g = side === 'home' ? m.homeGoals : m.awayGoals;
  const pen = side === 'home' ? m.homePen : m.awayPen;
  const otherPen = side === 'home' ? m.awayPen : m.homePen;
  const w = koWinner(m);
  const cls = w ? (w === side ? 'win' : 'lose') : '';
  const t = name ? (TEAM[name] || { vi: name, flag: '⚽' }) : null;
  const label = t ? `<span class="fl">${t.flag}</span>${esc(t.vi)}` : `<span class="btbd">Chưa xác định</span>`;
  const penTxt = (pen != null && otherPen != null) ? `<span class="pen"> (${pen})</span>` : '';
  return `<div class="brow ${cls}">
    <span class="tm">${label}</span>
    <span class="g">${g != null ? g : ''}${penTxt}</span>
  </div>`;
}

function bracketCard(m){
  const live = isLive(m), done = isDone(m);
  const tap = (live || done) && hasTeams(m);
  const meta = live
    ? `<div class="bmatch-meta live">● TRỰC TIẾP</div>`
    : done ? `<div class="bmatch-meta">Kết thúc</div>`
    : `<div class="bmatch-meta">${vnShort(m.dateUTC)}</div>`;
  return `<div class="bmatch${tap ? ' tappable' : ''}"${tap ? ` onclick="openMatch('${esc(m.id)}')"` : ''}>
    ${koTeamRow(m, 'home')}
    ${koTeamRow(m, 'away')}
    ${meta}
  </div>`;
}

function bracketHTML(ko){
  // Gom theo vòng, sắp theo thời gian
  const byStage = {};
  ko.forEach(m => (byStage[m.stage] = byStage[m.stage] || []).push(m));
  Object.values(byStage).forEach(a => a.sort((x, y) => x.dateUTC.localeCompare(y.dateUTC)));

  const cols = KO_ORDER.filter(s => byStage[s] && byStage[s].length).map(stage => {
    const isFinal = stage === 'Chung kết';
    const cards = byStage[stage].map(bracketCard).join('');
    return `<div class="bcol${isFinal ? ' final' : ''}">
      <div class="bcol-h">${stage}</div>
      <div class="bcol-body">${cards}</div>
    </div>`;
  }).join('');

  // Tranh hạng ba (nếu có) hiển thị riêng bên dưới
  const third = byStage['Tranh hạng ba'];
  const thirdHTML = third && third.length
    ? `<div style="margin-top:6px"><div class="bcol-h" style="max-width:208px">Tranh hạng ba</div>
       ${third.map(bracketCard).join('')}</div>`
    : '';

  return `<div class="bracket-wrap"><div class="bracket">${cols}</div></div>${thirdHTML}`;
}

function koListHTML(ko){
  const order = [...KO_ORDER, 'Tranh hạng ba'];
  const byStage = {};
  ko.forEach(m => (byStage[m.stage] = byStage[m.stage] || []).push(m));
  let html = '';
  order.forEach(stage => {
    const list = byStage[stage];
    if (!list || !list.length) return;
    list.sort((a, b) => a.dateUTC.localeCompare(b.dateUTC));
    html += `<h2 class="sec"><span class="bar" style="background:var(--gold)"></span>${stage}</h2>`;
    list.forEach(m => {
      // Dùng lại matchCard nếu đã có đội; nếu TBD thì hiện thẻ rút gọn
      html += hasTeams(m) ? matchCard(m, false)
        : `<div class="mcard"><div class="mtop"><span class="chip">${stage}</span>
           <span style="color:var(--mut)">${vnShort(m.dateUTC)}</span></div>
           <div class="mrow"><div class="team"><span class="name btbd">Chưa xác định</span></div>
           <div class="score"><span class="time">${vnTime(m.dateUTC)}</span></div>
           <div class="team"><span class="name btbd">Chưa xác định</span></div></div></div>`;
    });
  });
  return html;
}

/* ---------- TAB AI DỰ ĐOÁN ---------- */
function renderAI(){
  const el = document.getElementById('page-ai');
  let html = `<button class="btn-ai" id="btnAI" onclick="runPredict()">
      🤖 Tạo dự đoán cho các trận sắp tới (Gemini 3.5)
    </button>`;

  const preds = APP.predictions || [];
  if (!preds.length){
    html += `<div class="empty"><div class="big">🔮</div>
      Chưa có dự đoán nào. Bấm nút trên để Gemini phân tích các trận trong 48 giờ tới.
      (Hệ thống cũng tự chạy mỗi 6h sáng.)</div>`;
  } else {
    const matchById = {};
    (APP.matches || []).forEach(m => matchById[String(m.id)] = m);
    html += `<h2 class="sec"><span class="bar" style="background:var(--gold)"></span>
             Dự đoán của Gemini (${preds.length} trận)</h2>`;
    preds.forEach(p => {
      const m = matchById[String(p.matchId)];
      const h = TEAM[m ? m.home : ''] || { vi: m ? m.home : '?', flag: '' };
      const a = TEAM[m ? m.away : ''] || { vi: m ? m.away : '?', flag: '' };
      let topline = 'Chưa đá';
      if (m && isDone(m)){
        const okScore = m.homeGoals === p.predHome && m.awayGoals === p.predAway;
        const okWinner = Math.sign(m.homeGoals - m.awayGoals) === Math.sign(p.predHome - p.predAway);
        topline = `Kết quả thật: ${m.homeGoals}–${m.awayGoals}`
                + (okScore ? ' · ✅ Đúng tỷ số!' : okWinner ? ' · ☑️ Đúng kết quả' : ' · ❌ Sai');
      }
      const dateTxt = m ? vnLong(m.dateUTC) : '';
      html += `<div class="mcard">
        <div class="mtop"><span class="chip">${esc(dateTxt)}</span>
          <span style="font-weight:700">${topline}</span></div>
        <div class="mrow">
          <div class="team"><span class="flag">${h.flag}</span><span class="name">${esc(h.vi)}</span></div>
          <div class="score">${p.predHome}<span style="color:#C9C6BD"> : </span>${p.predAway}</div>
          <div class="team"><span class="flag">${a.flag}</span><span class="name">${esc(a.vi)}</span></div>
        </div>
        <div class="ai-chip">
          <div class="probs"><span>Thắng ${p.probHome}%</span><span>Hòa ${p.probDraw}%</span><span>Thua ${p.probAway}%</span></div>
          <div class="cmt">${esc(p.comment)}</div>
        </div>
      </div>`;
    });
  }
  el.innerHTML = html;
}

async function runPredict(){
  const b = document.getElementById('btnAI');
  b.disabled = true; b.textContent = '🤖 Gemini đang phân tích…';
  try{
    const res = await fetch('/api/predict', { method: 'POST' });
    const out = await res.json();
    if (!res.ok) throw new Error(out.error || 'HTTP ' + res.status);
    await loadData(false);
    toast(out.message || 'Đã tạo dự đoán.');
  }catch(e){
    toast('Lỗi: ' + e.message);
    renderAI();
  }
}

  if (btn.dataset.page === 'schedule'){
    const anchor = document.getElementById('todayAnchor');
    if (anchor) setTimeout(() => anchor.scrollIntoView({ block: 'start' }), 60);
  }
}

/* ---------- Popup chi tiết trận ---------- */
let sheetOpen = false;
let matchLoading = false;          // chống bấm dồn khi đang tải
const matchCache = {};             // cache chi tiết trận trong phiên (matchId -> data)

function openMatch(id){
  const m = (APP.matches || []).find(x => String(x.id) === String(id));
  if (!m) return;
  if (matchLoading) { toast('Đang tải một trận khác, vui lòng đợi…'); return; }

  const h = TEAM[m.home] || { vi: m.home, flag: '⚽' };
  const a = TEAM[m.away] || { vi: m.away, flag: '⚽' };
  const live = isLive(m);

  const head = `
    <div class="grip"></div>
    <div class="sheet-head">
      <div class="team"><span class="flag">${h.flag}</span><span class="name">${esc(h.vi)}</span></div>
      <div>
        <div class="sc">${m.homeGoals ?? '–'} : ${m.awayGoals ?? '–'}</div>
        <div style="text-align:center;font-size:11px;font-weight:700;color:${live ? 'var(--red)' : 'var(--mut)'}">
          ${live ? '● TRỰC TIẾP' : 'KẾT THÚC'}</div>
      </div>
      <div class="team"><span class="flag">${a.flag}</span><span class="name">${esc(a.vi)}</span></div>
    </div>
    <div class="sheet-meta">
      ${m.group ? `<span>Bảng <b>${esc(m.group)}</b></span>` : `<span>${esc(m.stage)}</span>`}
      ${m.venue ? `<span>🏟️ <b>${esc(m.venue)}</b></span>` : ''}
      ${m.city ? `<span>📍 ${esc(m.city)}</span>` : ''}
      ${m.attendance ? `<span>👥 <b>${num(m.attendance)}</b></span>` : ''}
    </div>`;

  document.getElementById('sheet').innerHTML = head +
    `<div class="sheet-loading"><div class="ball" style="animation:bounce 1s ease infinite">⚽</div>
     <div style="margin-top:10px">Đang tải diễn biến trận đấu…</div></div>`;
  openSheet();

  // Trận đã xem trong phiên này → lấy từ cache, không gọi lại server
  // (trận đang đá vẫn cho tải lại để cập nhật)
  if (matchCache[id] && !live){
    renderSheetBody(m, h, a, matchCache[id]);
    return;
  }

  matchLoading = true;
  fetch('/api/match?id=' + encodeURIComponent(id))
    .then(r => r.json())
    .then(d => {
      if (d.error) throw new Error(d.error);
      if (!live) matchCache[id] = d;          // chỉ cache trận đã kết thúc
      renderSheetBody(m, h, a, d);
    })
    .catch(e => {
      const load = document.querySelector('#sheet .sheet-loading');
      if (load) load.innerHTML = '😕 ' + esc(e.message);
    })
    .finally(() => { matchLoading = false; });
}

function renderSheetBody(m, h, a, d){
  const events = Array.isArray(d.events) ? d.events : [];
  const icon = t => ({
    goal: '⚽', penalty: '🥅', own_goal: '🔴', yellow: '🟨', red: '🟥'
  }[t] || '•');
  const label = t => ({
    goal: 'Bàn thắng', penalty: 'Phạt đền', own_goal: 'Phản lưới',
    yellow: 'Thẻ vàng', red: 'Thẻ đỏ'
  }[t] || '');

  let timeline = '';
  if (events.length){
    timeline = `<div class="tl-title"><span class="bar"></span>Diễn biến chính</div><div class="timeline">`;
    events.forEach(ev => {
      const side = ev.team === 'away' ? 'away' : 'home';
      const cell = `<div class="tl-ev ${side}">
        <span class="ic">${icon(ev.type)}</span>
        <span><span class="pl">${esc(ev.player || '')}</span>
        <span class="ty"> · ${label(ev.type)}</span></span></div>`;
      const min = `<span class="tl-min">${ev.minute != null ? ev.minute + "'" : ''}</span>`;
      timeline += `<div class="tl-row">
        ${side === 'home' ? cell : '<div></div>'}
        ${min}
        ${side === 'away' ? cell : '<div></div>'}
      </div>`;
    });
    timeline += `</div>`;
  }

  const summary = d.summary
    ? `<div class="summary"><div class="h">📝 Tóm tắt trận đấu</div>${esc(d.summary)}</div>`
    : '';

  // Bỏ phần loading, ghép nội dung (giữ lại head đã render)
  const sheet = document.getElementById('sheet');
  const loadEl = sheet.querySelector('.sheet-loading');
  if (loadEl) loadEl.remove();
  sheet.insertAdjacentHTML('beforeend',
    (timeline || summary
      ? timeline + summary
      : `<div class="sheet-loading">⚽ Chưa có dữ liệu diễn biến cho trận này.</div>`) +
    `<div class="sheet-note">Diễn biến do AI (Gemini) tổng hợp từ nguồn công khai,
     chỉ mang tính tham khảo và có thể chưa đầy đủ.</div>`);
}

function openSheet(){
  document.getElementById('sheetBg').classList.add('show');
  document.getElementById('sheet').classList.add('show');
  document.body.style.overflow = 'hidden';
  sheetOpen = true;
}
function closeSheet(){
  document.getElementById('sheetBg').classList.remove('show');
  document.getElementById('sheet').classList.remove('show');
  document.body.style.overflow = '';
  sheetOpen = false;
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}
</script>
</body>
